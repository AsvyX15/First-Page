<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ETHOS — Innovation Leadership Section</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b1730;
    --ink-2:#1a2540;
    --body:#3b4660;
    --muted:#6b7793;
    --bg:#eef3f9;
    --bg-2:#f6f9fc;
    --card:#ffffff;
    --line:#dfe6f1;
    --line-2:#e9eef7;
    --blue:#0a4a8f;
    --blue-2:#0e5fb4;
    --blue-soft:#cfe1f4;
    --cyan:#3fd3df;
    --cyan-2:#6fe3ec;
    --cyan-soft:#dffafd;
    --teal-deep:#0f7d8a;
    --shadow-sm:0 1px 2px rgba(11,23,48,.06),0 4px 14px -8px rgba(11,23,48,.10);
    --shadow:0 8px 24px -10px rgba(11,23,48,.18),0 2px 6px rgba(11,23,48,.06);
    --shadow-lg:0 30px 60px -25px rgba(10,74,143,.35),0 12px 28px -10px rgba(11,23,48,.18);
    --radius:18px;
    --radius-lg:26px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Plus Jakarta Sans",system-ui,sans-serif;
    color:var(--body);
    background:transparent;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:"Sora","Plus Jakarta Sans",sans-serif;color:var(--ink);margin:0;letter-spacing:-.01em}
  p{margin:0;line-height:1.6}
  a{color:inherit;text-decoration:none}

  .wrap{max-width:1240px;margin:0 auto;padding:0 32px}

  /* ---- Shared animations ---- */
  @keyframes floaty{
    0%,100%{transform:translate(0,0)}
    50%{transform:translate(8px,-12px)}
  }
  @keyframes spin{to{transform:rotate(360deg)}}


  /* ---- Reveal ---- */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .8s ease, transform .8s ease}
  .reveal.in{opacity:1;transform:none}
  .reveal.delay-2{transition-delay:.16s}

  /* ========= INNOVATION LEADERSHIP SECTION ========= */
  .innov-unit{
    background:transparent;
    color:#fff;position:relative;overflow:hidden;
    padding:0;
  }
  .innov-unit::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(900px 500px at 100% 30%, rgba(63,211,223,.15),transparent 60%),
      radial-gradient(700px 500px at 0% 100%, rgba(160,66,151,.18),transparent 60%);
    pointer-events:none;
  }

  .iu-row2{
    position:relative;z-index:2;
    display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center;
    padding:0;
  }

  @keyframes cardFloat{
    0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-12px) rotate(2deg)}
  }

  /* Stage / ID card */
  .iu-stage{
    position:relative;height:780px;display:flex;align-items:center;justify-content:center;
    overflow:visible;
  }
  .iu-orb-bg{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:820px;height:820px;border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%,rgba(63,211,223,.25),transparent 55%),
      conic-gradient(from 0deg,rgba(63,211,223,.12),transparent 30%,rgba(160,66,151,.18) 60%,transparent 90%);
    filter:blur(.5px);animation:spin 40s linear infinite;
  }
  .iu-orb-ring{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:740px;height:740px;border-radius:50%;
    border:1px dashed rgba(63,211,223,.35);
  }
  .iu-orb-ring::after{
    content:"";position:absolute;inset:60px;border-radius:50%;
    border:1px solid rgba(63,211,223,.2);
  }
  .iu-particle{
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:#3fd3df;box-shadow:0 0 14px #3fd3df;
    animation:floaty 5s ease-in-out infinite;
  }
  .iu-particle.p1{left:18%;top:28%}
  .iu-particle.p2{right:20%;top:24%;animation-delay:.6s}
  .iu-particle.p3{left:24%;bottom:30%;animation-delay:1.1s}
  .iu-particle.p4{right:14%;bottom:22%;animation-delay:1.6s}

  .iu-id{
    position:relative;z-index:3;width:240px;
    animation:cardFloat 5s ease-in-out infinite;
    transform-style:preserve-3d;
  }
  .iu-clip2{
    width:36px;height:14px;background:#1a2540;border-radius:6px;margin:0 auto;
    border:2px solid rgba(63,211,223,.6);position:relative;z-index:2;
  }
  .iu-clip2::after{
    content:"";display:block;width:8px;height:8px;border-radius:50%;
    background:#3fd3df;margin:3px auto 0;box-shadow:0 0 6px #3fd3df;
  }
  .iu-lan{
    width:8px;height:60px;
    background:linear-gradient(180deg,#3fd3df 0%,#a04297 100%);
    margin:0 auto -4px;position:relative;z-index:1;
  }
  .iu-body2{
    background:
      linear-gradient(160deg,rgba(63,211,223,.15),rgba(10,28,61,.95)),
      linear-gradient(160deg,#0a1c3d,#070f24);
    border:2px solid rgba(63,211,223,.6);
    border-radius:18px;padding:18px;text-align:center;
    box-shadow:
      0 30px 60px -15px rgba(0,0,0,.7),
      0 0 50px rgba(63,211,223,.25),
      inset 0 0 0 1px rgba(255,255,255,.04);
    position:relative;
  }
  .iu-body2::before{
    content:"MCMC · ETAD";
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:.3em;color:rgba(63,211,223,.7);font-weight:800;
  }
  .iu-photo2{
    width:100%;aspect-ratio:3/4;border-radius:12px;margin:14px 0 14px;
    background:radial-gradient(circle at 50% 35%, #1c7bd1, #0a4a8f 70%);
    border:1px solid rgba(63,211,223,.4);
    display:flex;align-items:flex-end;justify-content:center;
    position:relative;overflow:hidden;
  }
  .iu-photo2::before{
    content:"";position:absolute;left:50%;top:30%;transform:translateX(-50%);
    width:60px;height:60px;border-radius:50%;
    background:radial-gradient(circle at 40% 40%,#f5d9c0,#d4a784);
    box-shadow:0 4px 0 -2px #1a2540;
  }
  .iu-photo2::after{
    content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:120%;height:55%;border-radius:50% 50% 0 0/40% 40% 0 0;
    background:linear-gradient(180deg,#1a2540 0%,#0a1c3d 100%);
  }
  .iu-name2{font-family:"Sora";font-size:22px;font-weight:800;color:#fff;letter-spacing:-.01em}
  .iu-role2{
    font-size:9.5px;font-weight:800;color:#9aeaf3;letter-spacing:.16em;
    margin:6px 0 10px;
  }
  .iu-bio2{font-size:11px;color:#a8c8e8;line-height:1.55;padding:0 4px}

  .iu-copy2{
    padding-left:10mm;
  }
  .iu-copy2 .pill-label{
    display:inline-flex;align-items:center;gap:8px;
    padding:7px 18px;border-radius:999px;
    border:1px solid rgba(63,211,223,.45);
    font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
    color:#9aeaf3;margin-bottom:22px;
    background:rgba(63,211,223,.06);
    backdrop-filter:blur(4px);
  }
  .iu-copy2 .pill-label .dot{
    width:6px;height:6px;border-radius:50%;background:#9aeaf3;
  }
  .iu-copy2 h2{
    font-family:"Sora",sans-serif;
    color:#fff;
    font-size:clamp(42px,6vw,82px);
    line-height:1;font-weight:800;
    letter-spacing:-.03em;
    margin-bottom:22px;
    text-transform:uppercase;
  }
  .iu-copy2 h2 .accent{
    background:linear-gradient(135deg,#9aeaf3,#3fd3df 50%,#a04297);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .iu-copy2 .desc{
    font-size:16px;line-height:1.65;color:rgba(220,234,255,.75);
    font-weight:400;max-width:480px;margin-bottom:36px;
  }
  .iu-copy2 .stats-row{
    display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:520px;
  }
  .iu-copy2 .stat-b{
    border-top:1px solid rgba(63,211,223,.3);padding-top:14px;
  }
  .iu-copy2 .stat-b .n{
    font-family:"Sora";font-size:34px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1;
  }
  .iu-copy2 .stat-b .n .pl{color:#3fd3df}
  .iu-copy2 .stat-b .l{font-size:10.5px;letter-spacing:.16em;color:#9fb1cf;font-weight:700;margin-top:8px;text-transform:uppercase}
</style>
</head>
<body>

<!-- ============== INNOVATION LEADERSHIP SECTION ============== -->
<section class="innov-unit" id="innovation-unit">
  <div class="wrap iu-row2">
    <div class="iu-copy2 reveal">
      <div class="pill-label"><span class="dot"></span> Innovation Leadership</div>
      <h2>Building <span class="accent">intelligence</span><br>for the future.</h2>
      <p class="desc">We lead the exploration and implementation of emerging technologies — bridging research, policy, and industry to enable responsible, impactful adoption across MCMC.</p>
      <div class="stats-row">
        <div class="stat-b"><div class="n">06<span class="pl">+</span></div><div class="l">Active Domains</div></div>

        <div class="stat-b"><div class="n">2030</div><div class="l">AI Nation Vision</div></div>
      </div>
    </div>


    <div class="iu-stage reveal delay-2">
      <div class="iu-orb-bg"></div>
      <div class="iu-orb-ring"></div>
      <div class="iu-particle p1"></div>
      <div class="iu-particle p2"></div>
      <div class="iu-particle p3"></div>
      <div class="iu-particle p4"></div>
    </div>
  </div>
</section>

<script>
/* Reveal on scroll */
(function(){
  const els = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
    });
  },{threshold:.12, rootMargin:'0px 0px -40px 0px'});
  els.forEach(el=>io.observe(el));
  // Trigger immediately for elements already in view
  setTimeout(()=>els.forEach(el=>{ const r=el.getBoundingClientRect(); if(r.top<window.innerHeight) el.classList.add('in'); }),100);
})();
</script>
</body>
</html>
